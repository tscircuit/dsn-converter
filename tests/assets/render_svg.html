<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: #111216;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
    }
    #title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #3b82f6;
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
    }
    #svg-container {
      width: 90%;
      height: 80%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1e1f29;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid #2d3139;
      overflow: hidden;
      padding: 10px;
    }
    svg {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div id="title">Smoothieboard PCB Layout (Converted from DSN)</div>
  <div id="svg-container"></div>
  <script>
    fetch('smoothieboard_repro.svg')
      .then(res => res.text())
      .then(svgText => {
        document.getElementById('svg-container').innerHTML = svgText;
      });
  </script>
</body>
</html>
